x-base-provider:
  &base-provider {
    type: http,
    interval: 86400,
    health-check:
      {
        enable: true,
        url: "https://www.google.com/generate_204",
        interval: 300,
      },
    filter: "^(?!.*(群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))",
  }

x-url-test:
  &url-test {
    type: url-test,
    url: "https://www.gstatic.com/generate_204",
    interval: 300,
    empty-fallback: REJECT,
    include-all: true,
    hidden: true,
    tolerance: 50,
  }
x-load-balance:
  &load-balance {
    type: load-balance,
    url: "https://www.gstatic.com/generate_204",
    interval: 300,
    empty-fallback: REJECT,
    include-all: true,
    hidden: true,
    strategy: consistent-hashing,
  }
x-fallback:
  &fallback {
    type: fallback,
    url: "https://www.gstatic.com/generate_204",
    interval: 300,
    empty-fallback: REJECT,
  }

x-filter-hk: &filter-hk "(?i)港|hk|hongkong|hong kong|🇭🇰"
x-filter-tw: &filter-tw "(?i)台|tw|taiwan|taipei|🇹🇼|🇼🇸"
x-filter-jp: &filter-jp "(?i)日|jp|japan|tokyo|🇯🇵"
x-filter-sg: &filter-sg "(?i)新|sg|singapore|🇸🇬"
x-filter-kr: &filter-kr "(?i)韩|kr|korea|seoul|🇰🇷"
x-filter-us: &filter-us "(?i)美|us|usa|america|united states|🇺🇸"
x-filter-zj: &filter-zj "(?!)D|V|A"

