      name: 美国均衡-轮询,
      <<: *BaseCR,
      include-all: true,
      filter: *FilterUS,
      icon: https://git.imee.me/https://github.com/Koolson/Qure/raw/master/IconSet/Color/Round_Robin.png,
    }
  - {
      name: 欧盟均衡-轮询,
      <<: *BaseCR,
      include-all: true,
      filter: *FilterEU,
      icon: https://git.imee.me/https://github.com/Koolson/Qure/raw/master/IconSet/Color/Round_Robin.png,
    }

# 规则路由
rules:
  # 拦截规则
  - RULE-SET,tracking,REJECT
  - RULE-SET,awavenueads,REJECT
  - RULE-SET,advertising,REJECT
  - AND,((DST-PORT,443),(NETWORK,UDP)),REJECT # 阻止 QUIC

  # 域名规则
  - RULE-SET,private,直接连接
  - RULE-SET,direct,直接连接
  - RULE-SET,telegram,电报消息
  - RULE-SET,ai,人工智能
  - RULE-SET,youtube,油管视频
  - RULE-SET,github,GitHub
  - RULE-SET,spotify,Spotify
  - RULE-SET,google,谷歌服务
  - RULE-SET,microsoft,微软服务
  - RULE-SET,proxy,国外流量
  - RULE-SET,china,国内流量

  # IP规则
  - RULE-SET,advertising_ip,REJECT,no-resolve
  - RULE-SET,private_ip,直接连接,no-resolve
  - RULE-SET,telegram_ip,电报消息,no-resolve
  - RULE-SET,google_ip,谷歌服务,no-resolve
  - RULE-SET,ai_ip,人工智能,no-resolve
  - RULE-SET,proxy_ip,国外流量,no-resolve
  - RULE-SET,china_ip,国内流量,no-resolve

  # 兜底规则
  - MATCH,兜底流量

# 规则集
# 规则集行为模板
BehaviorDN:
  &BehaviorDN { type: http, behavior: domain, format: mrs, interval: 86400 }
BehaviorDY:
  &BehaviorDY { type: http, behavior: domain, format: yaml, interval: 86400 }
BehaviorIP:
  &BehaviorIP { type: http, behavior: ipcidr, format: mrs, interval: 86400 }
ClassicalText:
  &ClassicalText {
    type: http,
    interval: 86400,
    behavior: classical,
    format: text,
  }
ClassicalYaml:
  &ClassicalYaml {
    type: http,
    behavior: classical,
    interval: 3600,
    format: yaml,
    proxy: DIRECT,
  }

