# 自定义代理节点
proxies:
  # - name: "ss1"
  #   type: ss
  #   server: server
  #   port: 443
  #   cipher: aes-128-gcm
  #   password: password

# 基础设置
mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: false
allow-lan: false
unified-delay: true
tcp-concurrent: true
log-level: silent
bind-address: "*"
find-process-mode: "always"
keep-alive-interval: 15
keep-alive-idle: 600
authentication: [mihomo:yyds666]
skip-auth-prefixes: [127.0.0.1/8, "::1/128"]
experimental: { quic-go-disable-gso: true }

# 控制面板
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
external-controller: 127.0.0.1:9090
secret: rkorona
profile: { store-selected: true, store-fake-ip: true }

# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP: { ports: [80, 8080-8880], override-destination: true }
    TLS: { ports: [443, 8443] }
    QUIC: { ports: [443, 8443] }
  skip-domain: ["Mijia Cloud", "+.push.apple.com"]

# TUN模式
tun:
  enable: false
  stack: mixed
  dns-hijack: ["any:53", "tcp://any:53"]
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# DNS设置
dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver: [119.29.29.29, 180.184.1.1, 223.5.5.5]
  nameserver: [https://dns.alidns.com/dns-query, https://doh.pub/dns-query]
  fake-ip-filter:
    [+.miwifi.com, +.docker.io, +.market.xiaomi.com, +.push.apple.com]

# 代理策略组
proxy-groups:
  # 路由策略
  - {
      name: 国外流量,
      type: select,
      proxies: *oversea,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Global.png,
    }
  - {
      name: 谷歌服务,
      type: select,
      proxies: *us-first,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Google_Search.png,
    }
  - {
      name: 人工智能,
      type: select,
      proxies: *us-first,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/AI.png,
    }
  - {
      name: 微软服务,
      type: select,
      proxies: *us-first,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Microsoft.png,
    }
  - {
      name: 苹果服务,
      type: select,
      proxies: *direct,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Apple_1.png,
    }
  - {
      name: 国内流量,
      type: select,
      proxies: *direct,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/China.png,
    }
  - {
      name: 广告拦截,
      type: select,
      proxies: [REJECT-DROP, REJECT, DIRECT],
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Reject.png,
    }
  - {
      name: 漏网之鱼,
      type: select,
      proxies: *oversea,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Final.png,
    }

  # 自动选择
  - {
      name: 故障转移,
      <<: *fallback,
      proxies:
        [美国策略, 日本策略, 狮城策略, 韩国策略, 香港策略, 台湾策略, 自建节点],
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/ULB.png,
    }

  # 手动选择
  - {
      name: 全球手动,
      type: select,
      include-all: true,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Clubhouse.png,
    }

  - {
      name: 自建节点,
      type: select,
      include-all: true,
      filter: *filter-zj,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Clubhouse.png,
    }

  # 策略组区域
  - {
      name: 香港策略,
      type: select,
      include-all: true,
      filter: *filter-hk,
      proxies: [香港自动, 香港均衡],
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Hong_Kong.png,
    }
  - {
      name: 台湾策略,
      type: select,
      include-all: true,
      filter: *filter-tw,
      proxies: [台湾自动, 台湾均衡],
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Taiwan.png,
    }
  - {
      name: 日本策略,
      type: select,
      include-all: true,
      filter: *filter-jp,
      proxies: [日本自动, 日本均衡],
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Japan.png,
    }
  - {
      name: 狮城策略,
      type: select,
      include-all: true,
      filter: *filter-sg,
      proxies: [狮城自动, 狮城均衡],
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Singapore.png,
    }
  - {
      name: 韩国策略,
      type: select,
      include-all: true,
      filter: *filter-kr,
      proxies: [韩国自动, 韩国均衡],
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Korea.png,
    }
  - {
      name: 美国策略,
      type: select,
      include-all: true,
      filter: *filter-us,
      proxies: [美国自动, 美国均衡],
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/United_States.png,
    }

  # 自动测速
  - {
      name: 香港自动,
      <<: *url-test,
      filter: *filter-hk,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png,
    }
  - {
      name: 台湾自动,
      <<: *url-test,
      filter: *filter-tw,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png,
    }
  - {
      name: 日本自动,
      <<: *url-test,
      filter: *filter-jp,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png,
    }
  - {
      name: 狮城自动,
      <<: *url-test,
      filter: *filter-sg,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png,
    }
  - {
      name: 韩国自动,
      <<: *url-test,
      filter: *filter-kr,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png,
    }
  - {
      name: 美国自动,
      <<: *url-test,
      filter: *filter-us,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Auto.png,
    }

  # 负载均衡
  - {
      name: 香港均衡,
      <<: *load-balance,
      filter: *filter-hk,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Round_Robin_1.png,
    }
  - {
      name: 台湾均衡,
      <<: *load-balance,
      filter: *filter-tw,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Round_Robin_1.png,
    }
  - {
      name: 日本均衡,
      <<: *load-balance,
      filter: *filter-jp,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Round_Robin_1.png,
    }
  - {
      name: 狮城均衡,
      <<: *load-balance,
      filter: *filter-sg,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Round_Robin_1.png,
    }
  - {
      name: 韩国均衡,
      <<: *load-balance,
      filter: *filter-kr,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Round_Robin_1.png,
    }
  - {
      name: 美国均衡,
      <<: *load-balance,
      filter: *filter-us,
      icon: https://github.com/Koolson/Qure/raw/master/IconSet/Color/Round_Robin_1.png,
    }

# 规则路由
rules:
  # 广告拦截
  - RULE-SET,Tracking,广告拦截
  - RULE-SET,Advertising,广告拦截
  - AND,((NETWORK,UDP),(DST-PORT,443),(NOT,((GEOIP,CN,no-resolve)))),广告拦截

  # 本地/私有
  - RULE-SET,Private,DIRECT
  - RULE-SET,PrivateIP,DIRECT,no-resolve

  # 人工智能
  - RULE-SET,AI,人工智能
  - RULE-SET,AIIP,人工智能,no-resolve

  # 谷歌服务
  - RULE-SET,Google,谷歌服务
  - RULE-SET,GoogleIP,谷歌服务,no-resolve
  - RULE-SET,Microsoft,微软服务
  - RULE-SET,Apple,苹果服务

  # 国外流量
  - RULE-SET,Proxy,国外流量
  - RULE-SET,ProxyIP,国外流量,no-resolve

  # 国内流量
  - RULE-SET,China,国内流量
  - RULE-SET,ChinaIP,国内流量,no-resolve

  # 兜底规则
  - MATCH,漏网之鱼

