mode: rule
allow-lan: true
ipv6: true
global-ua: clash.meta
log-level: info
mixed-port: 7890
unified-delay: true
tcp-concurrent: true
disable-keep-alive: false
keep-alive-interval: 30
interface-name: Meta
find-process-mode: strict
global-client-fingerprint: chrome
external-controller: 127.0.0.1:9090
external-ui: ui
external-ui-url: "https://ghfast.top/https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

geodata-mode: false
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"
  asn: "https://github.com/xishang0128/geoip/releases/download/latest/GeoLite2-ASN.mmdb"
  proxy: DIRECT
profile:
  store-selected: true
  store-fake-ip: true

sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

dns:
  enable: true
  ipv6: true
  prefer-h3: true
  listen: 0.0.0.0:1053
  respect-rules: false
  use-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
    - 120.53.53.53
    - 119.29.29.29
    - 1.12.12.12
    - 202.99.104.68
    - 221.6.4.66
  nameserver:
    - https://1.1.1.1/dns-query#h3=true
    - https://1.0.0.1/dns-query#h3=true
    - https://8.8.8.8/dns-query#h3=true
    - tls://1.1.1.1
    - tls://8.8.8.8
  proxy-server-nameserver:
    - tls://1.1.1.1
    - tls://8.8.8.8
  nameserver-policy:
    "geosite:cn,private":
      - https://223.5.5.5/dns-query#h3=true
      - https://223.6.6.6/dns-query#h3=true
      - https://120.53.53.53/dns-query#h3=true
      - https://119.29.29.29/dns-query#h3=true
      - https://1.12.12.12/dns-query#h3=true
      - 202.99.104.68
      - 221.6.4.66
    #"geosite:geolocation-!cn":
    #  - 'https://8.8.8.8/dns-query#h3=true'
    #  - 'https://1.1.1.1/dns-query#h3=true'
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  strict-route: true
  auto-detect-interface: true

proxy-providers:
  free:
    url: ""
    type: http
    interval: 21600
    proxy: DIRECT
    health-check:
      enable: true
      interval: 1800
      url: "https://www.gstatic.com/generate_204"

url-test: &url-test
  type: url-test
  interval: 3600
  # tolerance: 50
  # lazy: true
  url: "https://www.gstatic.com/generate_204"

select: &select
  type: select
  proxies:
    [HongKong, Japan, Singapore, Taiwan, America, Hostdzire, CN, Other, All, DIRECT]
  # proxies: [Hostdzire, DIRECT, All]
proxies:
proxy-groups:
  - name: Proxy
    <<: *select
    icon: "https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/akkcloud.png"
  - name: Google
    <<: *select
    icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/Google.png"
  - name: GitHub
    <<: *select
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/GitHub.png"
  - name: China
    <<: *select
    icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/China.png"

  # 地区
  - name: HongKong
    <<: *url-test
    icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png"
    include-all: true
    filter: "(?i)(🇭🇰|香港|hk|HK|HongKong|Hong Kong)"

  - name: Japan
    <<: *url-test
    icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/JP.png"
    include-all: true
    filter: "(?i)(🇯🇵|日本|jp|JP|Japan)"

  - name: Singapore
    <<: *url-test
    icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/SG.png"
    include-all: true
    filter: "(?i)(🇸🇬|新加坡|狮城|sg|SG|Singapore)"

  - name: Taiwan
    <<: *url-test
    icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png"
    include-all: true
    filter: "(?i)(🇼🇸|台湾|tw|TW|Taiwan)"

  - name: America
    <<: *url-test
    icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png"
    include-all: true
    filter: "(?i)(🇺🇲|美国|USA|America|United States)"

  - name: Hostdzire
    type: select
    icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/XD.png"
    include-all: true
    filter: "(?i)(HD)"

  - name: CN
    <<: *url-test
    icon: "https://raw.githubusercontent.com/Orz-3/mini/master/Color/CN.png"
    include-all: true
    filter: "(?i)(🇨🇳)"

  - name: Other
    type: select
    icon: "https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Global.png"
    include-all: true
    filter: "(?i)^(?!.*(?:香港|HK|hk|HongKong|台湾|TW|tw|taiwan|日|JP|新|SG|美|america|US|N|H|徐|广|浙|镇|武|济)).*"

  - name: All
    <<: *url-test
    icon: "https://raw.githubusercontent.com/lige47/QuanX-icon-rule/main/icon/Lray.png"
    include-all: true

# 规则
rules:
  - RULE-SET,Advertising_Domain,REJECT
  - AND,(AND,(DST-PORT,443),(NETWORK,UDP)),(NOT,((GEOSITE,cn))),REJECT # 禁用quic(不包括国内)
  - RULE-SET,github,GitHub
  - RULE-SET,google,Google
  - RULE-SET,google_ip,Google,no-resolve
  - RULE-SET,geolocation-!cn,Proxy
  - RULE-SET,ChinaMax_Domain,China
  - RULE-SET,ChinaMax_IP,China,no-resolve
  - RULE-SET,private,China,no-resolve

  - GEOSITE,CN,China
  - GEOIP,CN,China,no-resolve
  - MATCH,Proxy

rule-anchor:
  ip: &ip
    type: http
    interval: 86400
    proxy: DIRECT
    behavior: ipcidr
    format: yaml
  domain: &domain
    type: http
    interval: 86400
    proxy: DIRECT
    behavior: domain
    format: yaml
# 规则集
rule-providers:
  Advertising_Domain:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/category-ads-all.yaml"
  ChinaMax_Domain:
    <<: *domain
    url: "https://github.com/blackmatrix7/ios_rule_script/raw/refs/heads/master/rule/Clash/ChinaMax/ChinaMax_Domain.yaml"
  private:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.yaml"
  google:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.yaml"
  github:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/github.yaml"
  geolocation-!cn:
    <<: *domain
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/geolocation-!cn.yaml"
  ChinaMax_IP:
    <<: *ip
    url: "https://github.com/blackmatrix7/ios_rule_script/raw/refs/heads/master/rule/Clash/ChinaMax/ChinaMax_IP.yaml"
  google_ip:
    <<: *ip
    url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/google.yaml"
