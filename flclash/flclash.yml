# 代理提供者
proxy-providers:
  FREE: { <<: *BaseProvider, url: "" }

# 核心配置
# 基础配置
mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: warning
bind-address: "*"
find-process-mode: "always"
client-fingerprint: chrome
keep-alive-interval: 15
keep-alive-idle: 600

# 认证配置
authentication:
  - mihomo:rkorona
skip-auth-prefixes:
  - 192.168.1.0/24
  - 192.168.31.0/24
  - 192.168.100.0/24
  - 127.0.0.1/8

# 实验性功能
experimental:
  quic-go-disable-gso: true

# 配置存储
profile:
  store-selected: true
  store-fake-ip: true

# 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# TUN模式配置
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

hosts:
  miwifi.com: 192.168.31.2
  services.googleapis.cn: services.googleapis.com
  cn.bing.com: global.bing.com
  dns.alidns.com: [223.5.5.5, 223.6.6.6, 2400:3200::1, 2400:3200:baba::1]
  doh.pub: [1.12.12.12, 1.12.12.21, 120.53.53.53]
  dns.google: [8.8.8.8, 8.8.4.4, 2001:4860:4860::8888, 2001:4860:4860::8844]
  cloudflare-dns.com:
    [1.1.1.1, 1.0.0.1, 2606:4700:4700::1111, 2606:4700:4700::1001]

# DNS配置
dns:
  enable: true
  ipv6: true
  use-hosts: true
  listen: 0.0.0.0:1053
  fake-ip-range: 198.18.0.1/16
  enhanced-mode: fake-ip
  respect-rules: true
  nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fake-ip-filter:
    - rule-set:direct
    - rule-set:private
    - rule-set:china
    - rule-set:fakeip-filter
    - +.pub.3gppnetwork.org
    - "+.bing.com"
    - +.miwifi.com
    - +.docker.io
    - +.market.xiaomi.com
    - +.push.apple.com

# 代理策略组
proxy-groups:
  # 主要策略组
  - {
      name: 默认代理,
      <<: *SelectFB,
      icon: https://git.imee.me/https://github.com/Koolson/Qure/raw/master/IconSet/Color/Static.png,
    }
  - {
      name: 故障转移,
      <<: *BaseFB,
      proxies:
        [
          香港策略,
          狮城策略,
          日本策略,
          韩国策略,
          美国策略,
          台湾策略,
          欧盟策略,
          全球手动,
          冷门自选,
          直接连接,
        ],
      icon: https://git.imee.me/https://github.com/Koolson/Qure/raw/master/IconSet/Color/ULB.png,
    }
  - {
      name: 国外流量,
      <<: *SelectPY,
      icon: https://git.imee.me/https://github.com/Koolson/Qure/raw/master/IconSet/Color/Global.png,
    }
  - {
      name: 国内流量,
      <<: *SelectDC,
      icon: https://git.imee.me/https://github.com/Koolson/Qure/raw/master/IconSet/Color/China.png,
    }
  - {
